services:
  web:
    build: .
    command: ["/app/.venv/bin/uvicorn", "giftcard_service.main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - giftcard-data:/app/data
    restart: unless-stopped

  worker:
    build: .
    command: ["/app/.venv/bin/python", "-m", "giftcard_service.worker"]
    env_file: .env
    volumes:
      - giftcard-data:/app/data
    restart: unless-stopped

volumes:
  giftcard-data:
